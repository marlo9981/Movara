# Reusable workflow for running unit tests

name: "🧪 Unit Testing"

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
        description: "From which folder this pipeline executes"
      python-version:
        required: true
        type: string
        description: "Python version to use"
      os:
        required: false
        type: string
        default: "ubuntu-latest"
        description: "Runner OS (e.g. ubuntu-latest or windows-latest)"
      coverage:
        required: false
        type: boolean
        default: true
        description: "Collect coverage (disable to speed up non-primary matrix legs)"

permissions:
  contents: read

env:
  UV_NO_SYNC: "true"

jobs:
  build:
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    runs-on: ${{ inputs.os }}
    timeout-minutes: 20
    name: "Python ${{ inputs.python-version }}"
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@v6

      - name: "🐍 Set up Python ${{ inputs.python-version }} + UV"
        uses: "./.github/actions/uv_setup"
        id: setup-python
        with:
          python-version: ${{ inputs.python-version }}
          cache-suffix: test-${{ inputs.working-directory }}
          working-directory: ${{ inputs.working-directory }}

      - name: "📦 Install Test Dependencies"
        shell: bash
        run: uv sync --group test --locked

      - name: "🧪 Run Unit Tests"
        if: runner.os != 'Windows'
        shell: bash
        env:
          RUN_SANDBOX_TESTS: "true"
        run: |
          if [ "${{ inputs.coverage }}" = "false" ]; then
            make test COV_ARGS=
          else
            make test
          fi

      - name: "🧪 Run Unit Tests (Windows)"
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ "${{ inputs.coverage }}" = "false" ]; then
            uv run --group test pytest -n auto -vvv tests/unit_tests/
          else
            uv run --group test pytest -n auto -vvv tests/unit_tests/ --cov=deepagents --cov-report=term-missing
          fi

      - name: "🧹 Verify Clean Working Directory"
        shell: bash
        run: |
          set -eu
          STATUS="$(git status)"
          echo "$STATUS"
          echo "$STATUS" | grep 'nothing to commit, working tree clean'
